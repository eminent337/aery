name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: |
          cd packages/tui && npm run build && cd ../..
          cd packages/ai && npm run build && cd ../..
          cd packages/agent && npm run build && cd ../..
          cd packages/coding-agent && npm run build && cd ../..

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/coding-agent
          npm publish --access public --ignore-scripts --tag latest

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: version,
                name: `Aery ${version}`,
                body: `## Aery ${version}\n\n### Install\n\`\`\`bash\nnpm install -g @eminent337/aery\n\`\`\`\n\n### Usage\n\`\`\`bash\naery\n\`\`\``,
                draft: false,
                prerelease: false
              });
              console.log(`Released ${version}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Release ${version} already exists, skipping.`);
              } else {
                throw e;
              }
            }
