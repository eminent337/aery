name: Weekly Upstream Sync

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
    - cron: '0 9 * * 3'  # Every Wednesday at 9am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Aery
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstreams
        run: |
          git remote add upstream https://github.com/badlogic/pi-mono.git
          git remote add upstream-jiti https://github.com/badlogic/jiti.git
          git remote add upstream-clipboard https://github.com/badlogic/clipboard.git
          git fetch upstream main
          git fetch upstream-jiti main
          git fetch upstream-clipboard main

      - name: Check for new commits
        id: check
        run: |
          SINCE=$(date -d '7 days ago' '+%Y-%m-%d')
          # Use %H alone (no --oneline) to get only hashes, oldest first
          PI_COMMITS=$(git log upstream/main --format="%H" --since="$SINCE" \
            -- packages/agent packages/ai packages/tui | tac)
          JITI_COMMITS=$(git log upstream-jiti/main --format="%H" --since="$SINCE" | head -5)

          if [ -z "$PI_COMMITS" ] && [ -z "$JITI_COMMITS" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No upstream changes this week."
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "PI_COMMITS<<EOF" >> $GITHUB_OUTPUT
            echo "$PI_COMMITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "JITI_COMMITS<<EOF" >> $GITHUB_OUTPUT
            echo "$JITI_COMMITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge upstream changes to main
        if: steps.check.outputs.has_updates == 'true'
        id: merge
        run: |
          MERGED=0
          FAILED=0
          SUMMARY=""

          # For each commit, extract the diff, remap pi->aery package names, then apply
          while IFS= read -r COMMIT; do
            [ -z "$COMMIT" ] && continue
            TOUCHED=$(git diff-tree --no-commit-id -r --name-only "$COMMIT" 2>/dev/null)
            # Skip generated files and CHANGELOG
            if echo "$TOUCHED" | grep -qE "models\.generated\.ts|CHANGELOG\.md"; then
              continue
            fi
            MSG=$(git log --format='%s' -1 "$COMMIT" 2>/dev/null)

            # Get the diff and remap package names
            git diff-tree -p "$COMMIT" 2>/dev/null \
              | sed \
                -e 's|@mariozechner/pi-coding-agent|@eminent337/aery|g' \
                -e 's|@mariozechner/pi-agent-core|@eminent337/aery-core|g' \
                -e 's|@mariozechner/pi-ai|@eminent337/aery-ai|g' \
                -e 's|@mariozechner/pi-tui|@eminent337/aery-tui|g' \
                -e 's|@mariozechner/pi-mom|@eminent337/aery-mom|g' \
                -e 's|@mariozechner/pi-web-ui|@eminent337/aery-web-ui|g' \
                -e 's|@mariozechner/pi-agent-old|@eminent337/aery-agent-old|g' \
                -e 's|@mariozechner/pi|@eminent337/aery-pods|g' \
                -e 's|badlogic/pi-mono|eminent337/aery|g' \
                -e 's|pi\.dev|eminent337.github.io|g' \
                -e 's|\.pi\.md|.aery.md|g' \
                -e 's|pi-extension-|aery-extension-|g' \
              > /tmp/upstream.patch

            if git apply --check /tmp/upstream.patch 2>/dev/null; then
              git apply /tmp/upstream.patch
              git add -A
              git commit -m "upstream(pi): $MSG" || true
              MERGED=$((MERGED+1))
              SUMMARY="$SUMMARY\n- $MSG"
            else
              FAILED=$((FAILED+1))
            fi
          done <<< "${{ steps.check.outputs.PI_COMMITS }}"

          # Merge jiti commits
          while IFS= read -r COMMIT; do
            [ -z "$COMMIT" ] && continue
            MSG=$(git log --format='%s' -1 "$COMMIT" 2>/dev/null)
            git diff-tree -p "$COMMIT" 2>/dev/null > /tmp/upstream-jiti.patch
            if git apply --check /tmp/upstream-jiti.patch 2>/dev/null; then
              git apply /tmp/upstream-jiti.patch
              git add -A
              git commit -m "upstream(jiti): $MSG" || true
              MERGED=$((MERGED+1))
              SUMMARY="$SUMMARY\n- [jiti] $MSG"
            else
              FAILED=$((FAILED+1))
            fi
          done <<< "${{ steps.check.outputs.JITI_COMMITS }}"

          echo "merged=$MERGED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          printf "summary=%s" "$SUMMARY" >> $GITHUB_OUTPUT

      - name: Bump version and publish to npm
        if: steps.check.outputs.has_updates == 'true' && steps.merge.outputs.merged != '0'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          npm install --no-save husky 2>/dev/null || true

          # Bump coding-agent version
          CURRENT=$(node -p "require('./packages/coding-agent/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./packages/coding-agent/package.json'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./packages/coding-agent/package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

          git add packages/coding-agent/package.json
          git pull --rebase origin main || true
          git commit -m "chore: bump version to $NEW_VERSION after upstream sync" || true
          git push origin main

          git tag "v$NEW_VERSION" || true
          git push origin "v$NEW_VERSION" || true

          npm publish ./packages/coding-agent --access public --ignore-scripts --tag latest

      - name: Push to main if build passed
        if: steps.check.outputs.has_updates == 'true' && steps.merge.outputs.merged != '0'
        run: git push origin main

      - name: Notify via GitHub issue
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const merged = parseInt('${{ steps.merge.outputs.merged }}' || '0');
            const failed = parseInt('${{ steps.merge.outputs.failed }}' || '0');
            const buildOk = '${{ 'true' }}';
            const today = new Date().toISOString().split('T')[0];

            let status, action;
            if (buildOk === 'true' && merged > 0) {
              status = '✅ Auto-merged and pushed to main';
              action = 'Nothing to do — already applied.';
            } else if (merged > 0 && buildOk !== 'true') {
              status = '⚠️ Merged but build failed — NOT pushed';
              action = 'Review the failed build and merge manually.';
            } else {
              status = 'ℹ️ No auto-mergeable commits (conflicts)';
              action = 'Manual merge required.';
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Upstream Sync] ${today} — ${status}`,
              labels: ['upstream-sync'],
              body: `## Weekly Upstream Sync — ${today}\n\n**Status:** ${status}\n**Merged:** ${merged} commits | **Skipped (conflicts):** ${failed}\n\n**Action needed:** ${action}`
            });
