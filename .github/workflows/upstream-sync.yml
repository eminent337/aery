name: Upstream Sync

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Aery
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstreams
        run: |
          git remote add upstream https://github.com/badlogic/pi-mono.git || true
          git fetch upstream main
          git fetch origin sync/upstream-rebranded || true

      - name: Check for new upstream commits
        id: check
        run: |
          NEW_COMMITS=$(git rev-list origin/sync/upstream-rebranded..upstream/main)
          if [ -z "$NEW_COMMITS" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Update Rebranded Channel
        if: steps.check.outputs.has_updates == 'true'
        run: |
          # Checkout the persistent rebranded branch
          git checkout sync/upstream-rebranded

          # Merge upstream updates. If a renamed string conflicts with new upstream logic,
          # we take upstream's logic (-X theirs). We will re-apply the renames in the next step.
          git merge upstream/main -X theirs -m "chore: merge upstream updates" || true

          # Apply all pi->aery renames to ensure new upstream code is rebranded
          find packages -name "*.ts" -o -name "*.json" -o -name "*.md" | \
            grep -v "node_modules\|dist\|CHANGELOG" | \
            xargs sed -i \
              -e 's|@mariozechner/pi-coding-agent|@eminent337/aery|g' \
              -e 's|@mariozechner/pi-agent-core|@eminent337/aery-core|g' \
              -e 's|@mariozechner/pi-ai|@eminent337/aery-ai|g' \
              -e 's|@earendil-works/pi-coding-agent|@eminent337/aery|g' \
              -e 's|@earendil-works/pi-agent-core|@eminent337/aery-core|g' \
              -e 's|@earendil-works/pi-ai|@eminent337/aery-ai|g' \
              -e 's|@mariozechner/pi-mom|@eminent337/aery-mom|g' \
              -e 's|@mariozechner/pi-web-ui|@eminent337/aery-web-ui|g' \
              -e 's|@mariozechner/pi-agent-old|@eminent337/aery-agent-old|g' \
              -e 's|@mariozechner/pi\b|@eminent337/aery-pods|g' \
              -e 's|badlogic/pi-mono|eminent337/aery|g' \
              -e 's|earendil-works/pi-mono|eminent337/aery|g' \
              -e 's|pi\.dev|eminent337.github.io|g' \
              -e 's|pi-extension-|aery-extension-|g' \
              -e 's|pi-debug\.log|aery-debug.log|g' \
              -e 's|pi-crash\.log|aery-crash.log|g' \
              -e 's|https://pi\.dev/api/latest-version|https://registry.npmjs.org/@eminent337/aery/latest|g' \
              -e 's|PI_CODING_AGENT_SESSION_DIR|AERY_CODING_AGENT_SESSION_DIR|g' \
              -e 's|PI_CODING_AGENT_DIR|AERY_CODING_AGENT_DIR|g' \
              -e 's|PI_CODING_AGENT\b|AERY_CODING_AGENT|g' \
              -e 's|PI_SKIP_VERSION_CHECK|AERY_SKIP_VERSION_CHECK|g' \
              -e 's|PI_OFFLINE|AERY_OFFLINE|g' \
              -e 's|PI_CONFIG_DIR|AERY_CONFIG_DIR|g' \
              -e 's|PI_AGENT_DIR|AERY_AGENT_DIR|g' \
              -e 's|PI_TELEMETRY|AERY_TELEMETRY|g' \
              -e 's|PI_PACKAGE_DIR|AERY_PACKAGE_DIR|g' \
              -e 's|PI_CACHE_RETENTION|AERY_CACHE_RETENTION|g' \
              -e 's|PI_HARDWARE_CURSOR|AERY_HARDWARE_CURSOR|g' \
              -e 's|PI_CLEAR_ON_SHRINK|AERY_CLEAR_ON_SHRINK|g' \
              -e 's|PI_DEBUG_REDRAW|AERY_DEBUG_REDRAW|g' \
              -e 's|PI_TUI_DEBUG|AERY_TUI_DEBUG|g' \
              -e 's|PI_TUI_WRITE_LOG|AERY_TUI_WRITE_LOG|g' \
              -e 's|PI_OAUTH_CALLBACK_HOST|AERY_OAUTH_CALLBACK_HOST|g' \
              -e 's|PI_AI_ANTIGRAVITY_VERSION|AERY_AI_ANTIGRAVITY_VERSION|g' \
              -e 's|PI_API_KEY|AERY_API_KEY|g' \
              -e 's|PI_SHARE_VIEWER_URL|AERY_SHARE_VIEWER_URL|g' \
              -e 's|PI_TIMING|AERY_TIMING|g' \
              -e 's|PI_WSL_CLIPBOARD_IMAGE_PATH|AERY_WSL_CLIPBOARD_IMAGE_PATH|g' \
              -e 's|PI_SPAWN_HOOK|AERY_SPAWN_HOOK|g' \
              -e 's|PI_NO_LOCAL_LLM|AERY_NO_LOCAL_LLM|g' \
              -e 's|PI_VERSION|AERY_VERSION|g' \
              -e 's|PI_STARTUP_BENCHMARK|AERY_STARTUP_BENCHMARK|g' \
              -e 's|PI_IMAGE_SAVE_MODE|AERY_IMAGE_SAVE_MODE|g' \
              -e 's|PI_IMAGE_SAVE_DIR|AERY_IMAGE_SAVE_DIR|g' \
              -e 's|interface PiManifest|interface AeryManifest|g' \
              -e 's|PiManifest\b|AeryManifest|g' \
              -e 's|readPiManifest\b|readAeryManifest|g' \
              -e 's|readPiManifestFile\b|readAeryManifestFile|g' \
              -e 's|piConfig\b|aeryConfig|g' \
              -e 's|piConfigName\b|aeryConfigName|g' \
              -e 's|pkg\.pi\b|pkg.aery|g' \
              -e 's|"X-OpenRouter-Title": "pi"|"X-OpenRouter-Title": "aery"|g' \
              -e 's|originator: string = "pi"|originator: string = "aery"|g' \
              -e 's|command: "pi"|command: "aery"|g' \
              -e 's|\.toBe("pi")|.toBe("aery")|g' \
              -e "s|\.toBe('pi')|.toBe('aery')|g" \
              -e 's|pi-test-auth|aery-test-auth|g' \
              -e 's|pi-test-model|aery-test-model|g' \
              -e 's|pi-test-prompts|aery-test-prompts|g' \
              -e 's|\.pi/extensions|.aery/extensions|g' \
              -e 's|\.pi/|.aery/|g' \
              -e 's|\.pi/skills|.aery/skills|g' \
              -e 's|\.pi/prompts|.aery/prompts|g' \
              -e 's|\.pi/themes|.aery/themes|g' \
              -e 's|\.pi/sessions|.aery/sessions|g' \
              -e 's|\.pi/settings|.aery/settings|g' \
              -e 's|\.pi/git|.aery/git|g' \
              -e 's|\.pi/npm|.aery/npm|g' \
              -e 's|\.pi/agents|.aery/agents|g' \
              -e 's|\.pi/hooks|.aery/hooks|g' \
              -e 's|\.pi/tools|.aery/tools|g' \
              -e 's|\.pi/commands|.aery/commands|g' \
              -e 's|\.pi/presets|.aery/presets|g' \
              -e 's|\.pi/sandbox|.aery/sandbox|g' \
              -e 's|\.pi/config|.aery/config|g' \
              -e 's|"\.pi"|".aery"|g' \
              -e "s|'\\.pi'|'.aery'|g" \
              -e 's|~/\.pi\b|~/.aery|g' \
              2>/dev/null || true

          perl -pi -e 's|\.pi/|.aery/|g; s|"\.pi"|".aery"|g; s|`\.pi`|`.aery`|g; s|\(\.pi/|\(.aery/|g' \
              packages/coding-agent/src/config.ts \
              packages/coding-agent/src/core/package-manager.ts \
              packages/coding-agent/src/modes/interactive/components/config-selector.ts \
              packages/coding-agent/package.json \
              2>/dev/null || true
              
          node -e "
            const fs = require('fs');
            const path = 'packages/coding-agent/src/core/extensions/loader.ts';
            if (!fs.existsSync(path)) process.exit(0);
            const lines = fs.readFileSync(path, 'utf-8').split('\n');
            const out = [];
            const seen = new Set();
            let inDedupeObject = false;
            for (const line of lines) {
              if (line.includes('const VIRTUAL_MODULES') || line.includes('_aliases = {')) {
                inDedupeObject = true;
                seen.clear();
              }
              if (inDedupeObject) {
                const match = line.match(/^(\s*)(\"[^\"]+\"|typebox):/);
                if (match) {
                  if (seen.has(match[2])) continue;
                  seen.add(match[2]);
                }
              }
              out.push(line);
              if (inDedupeObject && line.trim() === '};') inDedupeObject = false;
            }
            fs.writeFileSync(path, out.join('\n'));
          " || true

          node -e "
            const fs = require('fs');
            const p = 'packages/agent/src/proxy.ts';
            if (!fs.existsSync(p)) process.exit(0);
            let s = fs.readFileSync(p, 'utf-8');
            const orig = s;
            s = s.replace(/const response = await fetch\(/, 'const response = (await fetch(');
            s = s.replace(/signal: options\.signal,\n(\s*)\};/, 'signal: options.signal,\n$1})) as Response;');
            s = s.replace(/reader = response\.body!\.getReader\(\);/, 'const _rb = response.body; if (!_rb) throw new Error(\"no body\"); reader = _rb.getReader();');
            if (s !== orig) fs.writeFileSync(p, s);
          " || true

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebrand upstream updates" --no-verify
            git push origin sync/upstream-rebranded
          else
            git push origin sync/upstream-rebranded
          fi

      - name: Restore Protected Aery Files
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git checkout sync/upstream-rebranded

          # AERY PROTECTED: These files are Aery additions not present in upstream.
          # If upstream deleted them, restore them from the last known good commit.
          PROTECTED_FILES=(
            "packages/ai/src/utils/oauth/google-gemini-cli.ts"
            "packages/ai/src/utils/oauth/google-antigravity.ts"
            "packages/ai/src/providers/google-gemini-cli.ts"
          )

          RESTORED=false
          for FILE in "${PROTECTED_FILES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "⚠️  Protected file missing: $FILE — restoring from git history..."
              LAST_COMMIT=$(git log --all --oneline --diff-filter=D -- "$FILE" | head -1 | awk '{print $1}')
              if [ -n "$LAST_COMMIT" ]; then
                git show "${LAST_COMMIT}^:${FILE}" > "$FILE" 2>/dev/null && echo "✅ Restored $FILE" || echo "❌ Failed to restore $FILE"
                RESTORED=true
              else
                echo "❌ No history found for $FILE"
              fi
            fi
          done

          if [ "$RESTORED" = "true" ]; then
            # Re-inject the restored providers back into the registry if they were removed
            node -e "
              const fs = require('fs');
              const oauthIndex = 'packages/ai/src/utils/oauth/index.ts';
              if (fs.existsSync(oauthIndex)) {
                let content = fs.readFileSync(oauthIndex, 'utf-8');
                if (!content.includes('antigravityOAuthProvider')) {
                  content = content.replace(
                    /export \* from \"\.\/types\.js\";/,
                    '// Google Antigravity\nexport { antigravityOAuthProvider, loginAntigravity, refreshAntigravityToken } from \"./google-antigravity.js\";\n// Google Gemini CLI\nexport { geminiCliOAuthProvider, loginGeminiCli, refreshGoogleCloudToken } from \"./google-gemini-cli.js\";\n\nexport * from \"./types.js\";'
                  );
                  content = content.replace(
                    /import \{ openaiCodexOAuthProvider \} from \"\.\/openai-codex\.js\";/,
                    'import { antigravityOAuthProvider } from \"./google-antigravity.js\";\nimport { geminiCliOAuthProvider } from \"./google-gemini-cli.js\";\nimport { openaiCodexOAuthProvider } from \"./openai-codex.js\";'
                  );
                  content = content.replace(
                    /githubCopilotOAuthProvider,/,
                    'githubCopilotOAuthProvider,\n\tgeminiCliOAuthProvider,\n\tantigravityOAuthProvider,'
                  );
                  fs.writeFileSync(oauthIndex, content);
                }
              }

              const regBuiltins = 'packages/ai/src/providers/register-builtins.ts';
              if (fs.existsSync(regBuiltins)) {
                let content = fs.readFileSync(regBuiltins, 'utf-8');
                if (!content.includes('streamGoogleGeminiCli')) {
                  content = content.replace(
                    /import type \{ GoogleVertexOptions \} from \"\.\/google-vertex\.js\";/,
                    'import type { GoogleGeminiCliOptions } from \"./google-gemini-cli.js\";\nimport type { GoogleVertexOptions } from \"./google-vertex.js\";'
                  );
                  content = content.replace(
                    /interface GoogleVertexProviderModule/,
                    'interface GoogleGeminiCliProviderModule {\\n\\tstreamGoogleGeminiCli: StreamFunction<\"google-gemini-cli\", GoogleGeminiCliOptions>;\\n\\tstreamSimpleGoogleGeminiCli: StreamFunction<\"google-gemini-cli\", SimpleStreamOptions>;\\n}\\n\\ninterface GoogleVertexProviderModule'
                  );
                  content = content.replace(
                    /let googleVertexProviderModulePromise:/,
                    'let googleGeminiCliProviderModulePromise:\\n\\t| Promise<LazyProviderModule<\"google-gemini-cli\", GoogleGeminiCliOptions, SimpleStreamOptions>>\\n\\t| undefined;\\nlet googleVertexProviderModulePromise:'
                  );
                  content = content.replace(
                    /function loadGoogleVertexProviderModule/,
                    'function loadGoogleGeminiCliProviderModule(): Promise<\\n\\tLazyProviderModule<\"google-gemini-cli\", GoogleGeminiCliOptions, SimpleStreamOptions>\\n> {\\n\\tgoogleGeminiCliProviderModulePromise ||= import(\"./google-gemini-cli.js\").then((module) => {\\n\\t\\tconst provider = module as GoogleGeminiCliProviderModule;\\n\\t\\treturn {\\n\\t\\t\\tstream: provider.streamGoogleGeminiCli,\\n\\t\\t\\tstreamSimple: provider.streamSimpleGoogleGeminiCli,\\n\\t\\t};\\n\\t});\\n\\treturn googleGeminiCliProviderModulePromise;\\n}\\n\\nfunction loadGoogleVertexProviderModule'
                  );
                  content = content.replace(
                    /export const streamGoogleVertex/,
                    'export const streamGoogleGeminiCli = createLazyStream(loadGoogleGeminiCliProviderModule);\\nexport const streamSimpleGoogleGeminiCli = createLazySimpleStream(loadGoogleGeminiCliProviderModule);\\nexport const streamGoogleVertex'
                  );
                  content = content.replace(
                    /registerApiProvider\(\{\\n\\t\\tapi: \"google-vertex\"/,
                    'registerApiProvider({\\n\\t\\tapi: \"google-gemini-cli\",\\n\\t\\tstream: streamGoogleGeminiCli,\\n\\t\\tstreamSimple: streamSimpleGoogleGeminiCli,\\n\\t});\\n\\n\\tregisterApiProvider({\\n\\t\\tapi: \"google-vertex\"'
                  );
                  fs.writeFileSync(regBuiltins, content);
                }
              }

              const googleShared = 'packages/ai/src/providers/google-shared.ts';
              if (fs.existsSync(googleShared)) {
                let content = fs.readFileSync(googleShared, 'utf-8');
                if (!content.includes('google-gemini-cli')) {
                  content = content.replace(
                    /type GoogleApiType = \"google-generative-ai\" \| \"google-vertex\";/,
                    'type GoogleApiType = \"google-generative-ai\" | \"google-vertex\" | \"google-gemini-cli\";'
                  );
                  fs.writeFileSync(googleShared, content);
                }
              }
            " || true

            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "chore: restore protected Aery files (gemini-cli, antigravity)" --no-verify
              git push origin sync/upstream-rebranded
            fi
          fi

          # Also run the UI re-injection script for the custom-openai-compatible and aery-gateway logic
          if [ -f "scripts/inject-aery-ui.js" ]; then
            node -e "$(< scripts/inject-aery-ui.js)" || true
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "chore: restore protected Aery UI logic (custom-openai, aery-gateway)" --no-verify
              git push origin sync/upstream-rebranded
            fi
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        run: |
          PR_EXISTS=$(gh pr list --head sync/upstream-rebranded --state open --json number -q '.[0].number')
          
          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --head sync/upstream-rebranded \
              --base main \
              --title "🚀 Upstream Sync: Rebranded Updates" \
              --body "This PR merges the latest updates from the upstream \`badlogic/pi-mono/main\` branch into Aery.

            ✨ **Model C Rebranded Merge Channel**
            The updates in this PR have already been pre-processed to intelligently rename all \`pi\` and \`mariozechner\` strings to \`aery\` and \`eminent337\`.

            Because this branch natively shares history with \`main\`, GitHub will safely merge these updates without overwriting any of Aery's custom features!

            **Instructions:**
            1. Review the changes below. You will see upstream's new logic automatically adapted to our codebase.
            2. If GitHub indicates there are merge conflicts, it means upstream modified the exact same line of code that you heavily customized. You can resolve these conflicts natively in the GitHub UI or by pulling this branch locally.
            3. Once tests pass and conflicts are resolved, click **Merge**.

            *Note: Merging this PR will automatically trigger the \`publish.yml\` workflow to release the new version.*"
          else
            echo "PR already exists: #$PR_EXISTS"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
