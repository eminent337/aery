name: Daily Auto Release

on:
   schedule:
      - cron: '0 0 * * *' # Runs at midnight UTC every day
   workflow_dispatch:
      inputs:
         skip_npm:
            description: "Skip npm publish (passed to CI)"
            type: boolean
            default: false

jobs:
   auto-release:
      runs-on: ubuntu-22.04
      permissions:
         contents: write
         actions: write
      steps:
         - uses: actions/checkout@v4
           with:
              fetch-depth: 0 # Required to count commits since last tag

         - uses: oven-sh/setup-bun@v2
           with:
              bun-version: "1.3"

         - name: Run Auto Release
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           run: |
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
              
              # This script will check for commits since the last tag.
              # If there are commits, it will increment the patch version,
              # commit the bump, tag it, and push it atomically.
              # We pass --skip-watch because we will trigger the CI manually below.
              bun scripts/release.ts auto --skip-watch

         - name: Trigger CI Workflow
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           # If release.ts exited 0 without failing, a new tag was pushed (or no commits existed).
           # We then explicitly trigger the ci.yml workflow so it can build and publish.
           run: |
              LATEST_TAG=$(git describe --tags --abbrev=0)
              echo "Triggering CI workflow for tag $LATEST_TAG..."
              gh workflow run ci.yml --ref "$LATEST_TAG" -f skip_npm=${{ github.event.inputs.skip_npm || 'false' }} || echo "Workflow skipped or failed to trigger."
