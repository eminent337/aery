name: Publish on Push

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        !contains(github.event.workflow_run.head_commit.message, 'chore: bump version')
      )
    concurrency:
      group: publish-main
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine publish eligibility
        id: publish_guard
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_publish', 'true');
              await core.summary
                .addHeading('Publish Eligibility')
                .addTable([
                  [{ data: 'Field', header: true }, { data: 'Value', header: true }],
                  ['Event', context.eventName],
                  ['Decision', 'publish'],
                  ['Reason', 'manual workflow dispatch'],
                ])
                .write();
              return;
            }

            const sha = context.payload.workflow_run.head_sha;
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });
            const sourcePrefixes = [
              'packages/coding-agent/src/',
              'packages/ai/src/',
              'packages/agent/src/',
              'packages/tui/src/',
              'packages/web-ui/src/',
            ];
            const files = commit.files ?? [];
            const shouldPublish = files.some((file) =>
              sourcePrefixes.some((prefix) => file.filename.startsWith(prefix)),
            );
            core.setOutput('should_publish', shouldPublish ? 'true' : 'false');
            await core.summary
              .addHeading('Publish Eligibility')
              .addTable([
                [{ data: 'Field', header: true }, { data: 'Value', header: true }],
                ['Event', context.eventName],
                ['Source commit', sha],
                ['Changed files', String(files.length)],
                ['Decision', shouldPublish ? 'publish' : 'skip'],
                ['Reason', shouldPublish ? 'source package files changed' : 'no source package files changed'],
              ])
              .write();
            if (!shouldPublish) {
              core.info(`Skipping publish; no source package files changed in ${sha}.`);
            }

      - uses: actions/setup-node@v6
        if: steps.publish_guard.outputs.should_publish == 'true'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Configure git
        if: steps.publish_guard.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install build tools
        if: steps.publish_guard.outputs.should_publish == 'true'
        run: npm install -g "@typescript/native-preview@7.0.0-dev.20260120.1" 2>/dev/null || true

      - name: Bump version and publish to npm
        if: steps.publish_guard.outputs.should_publish == 'true'
        id: publish_package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          git pull --ff-only origin main
          npm install --ignore-scripts 2>/dev/null || true

          CURRENT=$(node -p "require('./packages/coding-agent/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          {
            echo "## Publish"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Current @eminent337/aery | $CURRENT |"
            echo "| New @eminent337/aery | $NEW_VERSION |"
            echo "| Commit | $(git rev-parse HEAD) |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Build in dependency order
          TSGO=$(which tsgo 2>/dev/null || echo "../../node_modules/.bin/tsgo")
          (cd packages/ai && $TSGO -p tsconfig.build.json 2>/dev/null || true)
          (cd packages/agent && $TSGO -p tsconfig.build.json 2>/dev/null || true)
          (cd packages/tui && $TSGO -p tsconfig.build.json 2>/dev/null || true)

          # Republish aery-ai and aery-core with fresh dist
          AI_CUR=$(node -p "require('./packages/ai/package.json').version")
          IFS='.' read -r A B C <<< "$AI_CUR"; AI_NEW="$A.$B.$((C+1))"
          echo "| New @eminent337/aery-ai | $AI_NEW |" >> "$GITHUB_STEP_SUMMARY"
          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('./packages/ai/package.json'));p.version='$AI_NEW';fs.writeFileSync('./packages/ai/package.json',JSON.stringify(p,null,2));"
          npm publish ./packages/ai --access public --ignore-scripts --tag latest || true

          CORE_CUR=$(node -p "require('./packages/agent/package.json').version")
          IFS='.' read -r A B C <<< "$CORE_CUR"; CORE_NEW="$A.$B.$((C+1))"
          echo "| New @eminent337/aery-core | $CORE_NEW |" >> "$GITHUB_STEP_SUMMARY"
          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('./packages/agent/package.json'));p.version='$CORE_NEW';fs.writeFileSync('./packages/agent/package.json',JSON.stringify(p,null,2));"
          npm publish ./packages/agent --access public --ignore-scripts --tag latest || true

          # Update coding-agent to use new aery-ai/aery-core versions
          node -e "const fs=require('fs');for(const f of ['packages/coding-agent/package.json']){const p=JSON.parse(fs.readFileSync(f));if(p.dependencies?.['@eminent337/aery-ai'])p.dependencies['@eminent337/aery-ai']='$AI_NEW';if(p.dependencies?.['@eminent337/aery-core'])p.dependencies['@eminent337/aery-core']='$CORE_NEW';fs.writeFileSync(f,JSON.stringify(p,null,2));}"

          # Build coding-agent with fresh aery-ai types via npm link
          (cd packages/ai && npm link 2>/dev/null || true)
          (cd packages/agent && npm link 2>/dev/null || true)
          (cd packages/coding-agent && npm link @eminent337/aery-ai @eminent337/aery-core 2>/dev/null || true)
          (cd packages/coding-agent && $TSGO -p tsconfig.build.json 2>/dev/null || true)
          chmod +x packages/coding-agent/dist/cli.js || true
          (cd packages/coding-agent && npm run copy-assets 2>/dev/null || true)

          if [ ! -f packages/coding-agent/dist/cli.js ]; then
            echo "ERROR: dist/cli.js not found — build failed"
            exit 1
          fi

          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('./packages/coding-agent/package.json'));p.version='$NEW_VERSION';fs.writeFileSync('./packages/coding-agent/package.json',JSON.stringify(p,null,2));"

          git add packages/ai/package.json packages/agent/package.json packages/coding-agent/package.json
          git commit -m "chore: bump version to $NEW_VERSION" || true
          git push origin main

          npm publish ./packages/coding-agent --access public --ignore-scripts --tag latest
          echo "Published @eminent337/aery@$NEW_VERSION"
          echo "| npm package | @eminent337/aery@$NEW_VERSION |" >> "$GITHUB_STEP_SUMMARY"

          git tag "v$NEW_VERSION" || true
          git push origin "v$NEW_VERSION" || true
          echo "| Git tag | v$NEW_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.publish_package.outputs.new_version != ''
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ steps.publish_package.outputs.new_version }}';
            const tag = `v${version}`;
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Aery ${tag}`,
                body: `## Aery ${tag}\n\n### Install\n\`\`\`bash\nnpm install -g @eminent337/aery\n\`\`\`\n\n### Usage\n\`\`\`bash\naery\n\`\`\``,
                draft: false,
                prerelease: false,
                make_latest: 'true'
              });
              await core.summary
                .addHeading('GitHub Release')
                .addTable([
                  [{ data: 'Field', header: true }, { data: 'Value', header: true }],
                  ['Tag', tag],
                  ['Release', `Aery ${tag}`],
                  ['Status', 'created'],
                ])
                .write();
              console.log(`Released ${tag}`);
            } catch (e) {
              if (e.status === 422) {
                await core.summary
                  .addHeading('GitHub Release')
                  .addTable([
                    [{ data: 'Field', header: true }, { data: 'Value', header: true }],
                    ['Tag', tag],
                    ['Status', 'already exists'],
                  ])
                  .write();
                console.log(`Release ${tag} already exists, skipping.`);
              } else {
                throw e;
              }
            }
