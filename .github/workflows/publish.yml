name: Publish on Push

on:
  push:
    branches: [main]
    paths:
      - 'packages/coding-agent/src/**'
      - 'packages/ai/src/**'
      - 'packages/agent/src/**'
      - 'packages/tui/src/**'
      - 'packages/web-ui/src/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          npm install --ignore-scripts --legacy-peer-deps 2>&1 | tail -3

          CURRENT=$(node -p "require('./packages/coding-agent/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          TSGO="./node_modules/.bin/tsgo"

          # Build ai and agent
          (cd packages/ai && $TSGO -p tsconfig.build.json 2>&1)
          (cd packages/agent && $TSGO -p tsconfig.build.json 2>&1)
          (cd packages/tui && $TSGO -p tsconfig.build.json 2>&1 || true)

          # Link freshly built packages so coding-agent uses local dist, not stale npm versions
          (cd packages/ai && npm link 2>/dev/null || true)
          (cd packages/agent && npm link 2>/dev/null || true)
          (cd packages/coding-agent && npm link @eminent337/aery-ai @eminent337/aery-core 2>/dev/null || true)

          # Build coding-agent
          (cd packages/coding-agent && $TSGO -p tsconfig.build.json 2>&1)
          chmod +x packages/coding-agent/dist/cli.js || true
          (cd packages/coding-agent && npm run copy-assets 2>/dev/null || true)

          if [ ! -f packages/coding-agent/dist/cli.js ]; then
            echo "ERROR: dist/cli.js not found — build failed"
            exit 1
          fi

          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('./packages/coding-agent/package.json'));p.version='$NEW_VERSION';fs.writeFileSync('./packages/coding-agent/package.json',JSON.stringify(p,null,2));"

          git add packages/coding-agent/package.json
          git pull --rebase origin main || true
          git commit -m "chore: bump version to $NEW_VERSION" || true
          git push origin main

          git tag "v$NEW_VERSION" || true
          git push origin "v$NEW_VERSION" || true

          npm publish ./packages/coding-agent --access public --ignore-scripts --tag latest
          echo "Published @eminent337/aery@$NEW_VERSION"
