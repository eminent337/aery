name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build
        run: |
          npm run build --prefix packages/ai
          npm run build --prefix packages/agent
          npm run build --prefix packages/coding-agent

      - name: Verify workspace links
        run: |
          # Ensure coding-agent uses local aery-ai (not npm published)
          if [ ! -L "packages/coding-agent/node_modules/@eminent337/aery-ai" ]; then
            rm -rf packages/coding-agent/node_modules/@eminent337/aery-ai
            ln -s ../../../ai packages/coding-agent/node_modules/@eminent337/aery-ai
          fi
          if [ ! -L "packages/coding-agent/node_modules/@eminent337/aery-core" ]; then
            rm -rf packages/coding-agent/node_modules/@eminent337/aery-core
            ln -s ../../../agent packages/coding-agent/node_modules/@eminent337/aery-core
          fi

      - name: Test
        run: npm run test --prefix packages/coding-agent
