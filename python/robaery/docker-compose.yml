services:
  # ───────────────────────────────────────────────────────────────────────────
  # roboomp orchestrator
  #
  # NOTE: `env_file:` is INTENTIONALLY ABSENT. We never want the gh-proxy's
  # PAT (`GITHUB_TOKEN` in .env) to leak into this container's environment.
  # Every variable below is an explicit allowlist; compose still reads `.env`
  # for `${VAR}` interpolation, but only the keys listed here flow into the
  # container. Adding a new secret means an explicit compose-level decision
  # about which container is allowed to see it.
  # ───────────────────────────────────────────────────────────────────────────
  robaery:
    build:
      # aery root: gives the web-builder stage access to the workspace
      # bun.lock + catalog (web/package.json refs `catalog:` versions).
      # python/robaery/data and aery-root excludes are filtered via
      # Dockerfile.robaery.dockerignore at the context root.
      context: ../..
      dockerfile: Dockerfile.robaery
      args:
        # Tag of the pre-built aery-base image produced by `bun run aery:image`
        # (sources: aery root /Dockerfile). Override per-environment as needed.
        PI_BASE: aery/aery:dev
    image: robaery:dev
    container_name: robaery
    # Phase B (graceful shutdown): gives the orchestrator at least
    # ROBAERY_SHUTDOWN_DRAIN_TIMEOUT_SECONDS + ROBAERY_SHUTDOWN_KILL_TIMEOUT_SECONDS
    # before SIGKILL. Defaults: 25 + 5 = 30s.
    stop_grace_period: 30s
    restart: unless-stopped
    environment:
      # --- gh-proxy channel ---
      # The orchestrator NEVER holds GITHUB_TOKEN; it talks to the sibling
      # gh-proxy container over the internal-only network.
      ROBAERY_GH_PROXY_URL: http://gh-proxy:8081
      ROBAERY_GH_PROXY_HMAC_KEY: ${ROBAERY_GH_PROXY_HMAC_KEY:?ROBAERY_GH_PROXY_HMAC_KEY must be set in .env}

      # --- webhook + identity ---
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      ROBAERY_BOT_LOGIN: ${ROBAERY_BOT_LOGIN:?ROBAERY_BOT_LOGIN must be set in .env}
      ROBAERY_GIT_AUTHOR_NAME: ${ROBAERY_GIT_AUTHOR_NAME:-}
      ROBAERY_GIT_AUTHOR_EMAIL: ${ROBAERY_GIT_AUTHOR_EMAIL:?ROBAERY_GIT_AUTHOR_EMAIL must be set in .env}
      ROBAERY_REPO_ALLOWLIST: ${ROBAERY_REPO_ALLOWLIST:?ROBAERY_REPO_ALLOWLIST must be set in .env}
      ROBAERY_MAINTAINER_LOGINS: ${ROBAERY_MAINTAINER_LOGINS:-}
      ROBAERY_REVIEWER_BOTS: ${ROBAERY_REVIEWER_BOTS:-}

      # --- model selection ---
      ROBAERY_MODEL: ${ROBAERY_MODEL:-anthropic/claude-sonnet-4-6}
      ROBAERY_PROVIDER: ${ROBAERY_PROVIDER:-}
      ROBAERY_THINKING: ${ROBAERY_THINKING:-high}

      # --- runtime tuning ---
      ROBAERY_MAX_CONCURRENCY: ${ROBAERY_MAX_CONCURRENCY:-8}
      ROBAERY_TASK_TIMEOUT_SECONDS: ${ROBAERY_TASK_TIMEOUT_SECONDS:-2400}
      ROBAERY_TASK_TIMEOUT_HARD_GRACE_SECONDS: ${ROBAERY_TASK_TIMEOUT_HARD_GRACE_SECONDS:-60}
      ROBAERY_REQUEST_TIMEOUT_SECONDS: ${ROBAERY_REQUEST_TIMEOUT_SECONDS:-120}
      ROBAERY_RATE_LIMIT_WINDOW_SECONDS: ${ROBAERY_RATE_LIMIT_WINDOW_SECONDS:-3600}
      ROBAERY_RATE_LIMIT_DEFAULT: ${ROBAERY_RATE_LIMIT_DEFAULT:-3}
      ROBAERY_RATE_LIMIT_CONTRIBUTOR: ${ROBAERY_RATE_LIMIT_CONTRIBUTOR:-10}
      ROBAERY_RATE_LIMIT_UNLIMITED: ${ROBAERY_RATE_LIMIT_UNLIMITED:-}
      ROBAERY_QUESTION_AUTOCLOSE_ENABLED: ${ROBAERY_QUESTION_AUTOCLOSE_ENABLED:-true}
      ROBAERY_QUESTION_AUTOCLOSE_HOURS: ${ROBAERY_QUESTION_AUTOCLOSE_HOURS:-4}
      ROBAERY_QUESTION_AUTOCLOSE_SCAN_SECONDS: ${ROBAERY_QUESTION_AUTOCLOSE_SCAN_SECONDS:-60}
      ROBAERY_REPLAY_TOKEN: ${ROBAERY_REPLAY_TOKEN:-}

      # --- container-fixed paths ---
      ROBAERY_COMMAND: aery
      ROBAERY_WORKSPACE_ROOT: /data/workspaces
      ROBAERY_SQLITE_PATH: /data/robaery.sqlite
      ROBAERY_LOG_DIR: /data/logs
      ROBAERY_BIND_HOST: ${ROBAERY_BIND_HOST:-0.0.0.0}
      ROBAERY_BIND_PORT: ${ROBAERY_BIND_PORT:-8080}
      PI_ROOT: /work/aery
    depends_on:
      gh-proxy:
        condition: service_started
    # Resolve `llm-gateway.internal` (used in /srv/agent-home/.aery/agent/models.yml) to the
    # Docker host. The actual gateway listens on 127.0.0.1:4000 on the host;
    # `host-gateway` is Docker's alias for the host bridge IP.
    extra_hosts:
      - "llm-gateway.internal:host-gateway"
    networks:
      - default
      - robaery_internal
    volumes:
      - ${PI_ROOT:-../..}:/work/aery:ro
      - robaery_data:/data
      # Host agent config is mounted read-only under /srv/agent-home-stage
      # with host-controlled permissions. The entrypoint copies it into
      # root-owned, world-readable files under /srv/agent-home; the agent
      # subprocess runs with HOME=/srv/agent-home, so ~/.aery and ~/.agent
      # resolve there without exposing mutable host mounts.
      - ${HOME}/.aery/agent/models.container.yml:/srv/agent-home-stage/.aery/agent/models.yml:ro
      - ${HOME}/.agent/AGENT.md:/srv/agent-home-stage/.agent/AGENTS.md:ro
      - ${HOME}/.agent/rules:/srv/agent-home-stage/.agent/rules:ro
    ports:
      - "0.0.0.0:6543:8080"

  # ───────────────────────────────────────────────────────────────────────────
  # gh-proxy
  #
  # The only container that ever holds GITHUB_TOKEN. Reachable only from the
  # orchestrator on the internal-only network — no host port mapping. Every
  # request must carry a valid HMAC signature (ROBAERY_GH_PROXY_HMAC_KEY).
  # `env_file:` is INTENTIONALLY ABSENT for the same reason: the explicit
  # allowlist below is the only place where any var lands in this container.
  # ───────────────────────────────────────────────────────────────────────────
  gh-proxy:
    image: robaery:dev
    container_name: gh-proxy
    restart: unless-stopped
    command: ["python", "-m", "robaery.proxy", "serve"]
    environment:
      # PAT: lives ONLY here. The orchestrator's compose block refuses to
      # let this var into its container.
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN must be set in .env}
      # Shared with the orchestrator: HMAC verification key.
      ROBAERY_GH_PROXY_HMAC_KEY: ${ROBAERY_GH_PROXY_HMAC_KEY:?ROBAERY_GH_PROXY_HMAC_KEY must be set in .env}
      # The proxy reuses the SandboxManager pool layout under /data/workspaces.
      ROBAERY_WORKSPACE_ROOT: /data/workspaces
      ROBAERY_SQLITE_PATH: /data/robaery.sqlite
      ROBAERY_LOG_DIR: /data/logs
      # Bind on the internal network only.
      ROBAERY_GH_PROXY_BIND_HOST: 0.0.0.0
      ROBAERY_GH_PROXY_BIND_PORT: 8081
      # Settings still requires these on construction; the proxy never uses
      # them but the validator runs the same code path as the orchestrator.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET must be set in .env}
      ROBAERY_BOT_LOGIN: ${ROBAERY_BOT_LOGIN:?ROBAERY_BOT_LOGIN must be set in .env}
      ROBAERY_GIT_AUTHOR_EMAIL: ${ROBAERY_GIT_AUTHOR_EMAIL:?ROBAERY_GIT_AUTHOR_EMAIL must be set in .env}
      ROBAERY_REPO_ALLOWLIST: ${ROBAERY_REPO_ALLOWLIST:?ROBAERY_REPO_ALLOWLIST must be set in .env}
    networks:
      # `default` gives gh-proxy outbound NAT to api.github.com; `robaery_internal`
      # is how the orchestrator reaches it. No `ports:` mapping → still
      # unreachable from the host or any sibling project.
      - default
      - robaery_internal
    volumes:
      # Shared workspace pool/worktrees so the proxy can drive git operations
      # against the same per-issue worktrees the orchestrator builds.
      - robaery_data:/data

networks:
  # External-facing bridge: webhook ingress (8080) and the orchestrator's
  # outbound path to the host LLM gateway via extra_hosts.
  default: {}
  # Orchestrator <-> gh-proxy only. internal: true means no egress and no
  # ingress from outside the compose project.
  robaery_internal:
    internal: true

volumes:
  # Docker-managed Linux volume so UID/GID permissions on /data are enforced.
  robaery_data: {}
