<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#0d0d0d"/>
  <!-- Left wing (swooping up) -->
  <path d="M120 340 Q140 200 256 140 Q200 220 180 340 Z" fill="url(#wing)" opacity="0.9"/>
  <!-- Right wing (swooping up) -->
  <path d="M392 340 Q372 200 256 140 Q312 220 332 340 Z" fill="url(#wing)" opacity="0.9"/>
  <!-- Central body / "A" peak -->
  <path d="M256 120 L220 320 L256 300 L292 320 Z" fill="url(#body)"/>
  <!-- Crossbar of A -->
  <rect x="210" y="260" width="92" height="14" rx="4" fill="#f97316" opacity="0.7"/>
  <!-- Eye / accent dot -->
  <circle cx="256" cy="170" r="12" fill="#0d0d0d"/>
  <circle cx="256" cy="170" r="6" fill="#fbbf24"/>
</svg>
